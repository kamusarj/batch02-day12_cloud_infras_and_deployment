<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chatbot — Day 12 Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 720px; height: 90vh; display: flex; flex-direction: column; background: #1e293b; border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
        .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        .header .logo { width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header .title { font-weight: 600; font-size: 18px; }
        .header .subtitle { font-size: 11px; opacity: 0.7; }
        .header .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .header .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .config-bar { background: #0f172a; padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #334155; }
        .config-bar label { font-size: 11px; color: #94a3b8; }
        .config-bar input { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 12px; width: 140px; }
        .config-bar input:focus { outline: none; border-color: #6366f1; }
        .config-bar button { background: #6366f1; border: none; color: white; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .config-bar button:hover { background: #4f46e5; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: #6366f1; color: white; border-bottom-right-radius: 4px; }
        .msg.agent { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .msg .meta { font-size: 10px; opacity: 0.5; margin-top: 4px; }
        .msg.error { background: #7f1d1d; color: #fca5a5; align-self: center; font-size: 12px; }
        .input-area { padding: 12px 16px; background: #0f172a; display: flex; gap: 8px; border-top: 1px solid #334155; }
        .input-area input { flex: 1; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 14px; border-radius: 10px; font-size: 14px; }
        .input-area input:focus { outline: none; border-color: #6366f1; }
        .input-area button { background: #6366f1; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-area button:hover:not(:disabled) { background: #4f46e5; }
        .typing { display: flex; gap: 4px; padding: 10px 14px; align-self: flex-start; }
        .typing span { width: 6px; height: 6px; background: #64748b; border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; } .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🤖</div>
        <div>
            <div class="title">AI Agent — Day 12</div>
            <div class="subtitle">Production Deployment Lab</div>
        </div>
        <div class="status"><span class="dot"></span> Railway</div>
    </div>

    <div class="config-bar">
        <label>API Key:</label>
        <input type="password" id="apiKey" value="secret-key-123" placeholder="X-API-Key">
        <label>Endpoint:</label>
        <input type="text" id="endpoint" value="https://agile-amazement-production-8b53.up.railway.app/ask" placeholder="/ask URL">
        <button onclick="testConnection()">Test</button>
    </div>

    <div class="messages" id="messages">
        <div class="msg agent">
            👋 Hello! Tôi là AI Agent được deploy trên Railway.
            <br>Hỏi tôi về Docker, deploy, hoặc bất cứ gì nhé!
            <div class="meta">Hệ thống</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="question" placeholder="Nhập câu hỏi..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
const messages = document.getElementById('messages');
const question = document.getElementById('question');
const sendBtn = document.getElementById('sendBtn');

function addMsg(type, text, meta = '') {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.innerHTML = text + (meta ? `<div class="meta">${meta}</div>` : '');
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
}

async function sendMessage() {
    const q = question.value.trim();
    if (!q) return;

    const apiKey = document.getElementById('apiKey').value;
    const endpoint = document.getElementById('endpoint').value;

    addMsg('user', q.replace(/\n/g, '<br>'));
    question.value = '';
    sendBtn.disabled = true;
    addTyping();

    try {
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
            body: JSON.stringify({ question: q })
        });
        removeTyping();
        if (res.status === 401) {
            addMsg('error', '🔒 Chưa xác thực — Kiểm tra API Key');
        } else if (res.status === 429) {
            addMsg('error', '⏳ Rate limit — Vui lòng đợi 1 phút');
        } else if (!res.ok) {
            addMsg('error', `❌ Lỗi: ${res.status} — ${(await res.json()).detail || 'Unknown'}`);
        } else {
            const data = await res.json();
            addMsg('agent', data.answer, `${data.model} · ${new Date(data.timestamp).toLocaleTimeString()}`);
        }
    } catch (e) {
        removeTyping();
        addMsg('error', `⚠️ Không kết nối được: ${e.message}`);
    }
    sendBtn.disabled = false;
    question.focus();
}

async function testConnection() {
    const healthUrl = document.getElementById('endpoint').value.replace('/ask', '/health');
    try {
        const res = await fetch(healthUrl);
        const data = await res.json();
        addMsg('agent', `✅ Kết nối OK!<br>📦 v${data.version} · ⏱ uptime ${data.uptime_seconds}s`, 'Health check');
    } catch (e) {
        addMsg('error', `❌ Không kết nối được: ${e.message}`);
    }
}
</script>
</body>
</html>
